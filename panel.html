<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель — Previsit.ai</title>
<style>
  :root {
    --navy: #16294d;
    --blue: #2f6ee0;
    --blue-hover: #2a63cc;
    --bg: #f4f5f7;
    --border: #e7e9ee;
    --text-muted: #6b7280;
    --orange-bg: #fdf1e7;
    --orange-text: #d98a3d;
    --green-bg: #e3f8ee;
    --green-text: #1fa363;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: #111827;
  }

  .topbar {
    height: 6px;
    background: #16294d;
  }

  header.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .logo {
    display: flex;
    align-items: center;
  }

  .logo svg { display: block; }

  nav.links {
    display: flex;
    gap: 32px;
  }

  nav.links a {
    text-decoration: none;
    color: #9aa1ac;
    font-size: 15px;
    font-weight: 500;
    padding-bottom: 18px;
    position: relative;
    top: 2px;
  }

  nav.links a.active {
    color: var(--navy);
    border-bottom: 2px solid var(--blue);
    padding-bottom: 16px;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--orange-bg);
    color: var(--orange-text);
    font-size: 14px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 8px;
  }

  .pill .count {
    color: #f0b27a;
    font-weight: 600;
  }

  .pill .plus-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid var(--orange-text);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }

  .badge-free {
    background: var(--green-bg);
    color: var(--green-text);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 8px;
  }

  .user-menu {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #374151;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }

  .user-menu svg.globe { color: #9aa1ac; }
  .user-menu svg.chevron { color: #9aa1ac; }

  main {
    padding: 32px;
    max-width: 1500px;
    margin: 0 auto;
  }

  h1.page-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--navy);
    margin: 8px 0 28px 4px;
  }

  .toolbar-card {
    background: #fff;
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    justify-content: flex-end;
  }

  .btn-invite {
    display: flex;
    align-items: stretch;
    border-radius: 8px;
    overflow: hidden;
  }

  .btn-invite .main {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 12px 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-invite .chev {
    background: var(--blue);
    color: #fff;
    border: none;
    border-left: 1px solid rgba(255,255,255,0.25);
    padding: 12px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
  }

  .btn-invite .main:hover,
  .btn-invite .chev:hover {
    background: var(--blue-hover);
  }

  .actions-card {
    background: #fff;
    border-radius: 14px;
    padding: 24px;
  }

  .actions-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .action-tile {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 44px 20px;
    text-align: center;
    cursor: pointer;
    transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
  }

  .action-tile:hover {
    box-shadow: 0 6px 18px rgba(22, 41, 77, 0.08);
    border-color: #d7dbe3;
    transform: translateY(-1px);
  }

  .action-tile h3 {
    margin: 0 0 20px 0;
    font-size: 19px;
    font-weight: 700;
    color: var(--navy);
  }

  .action-tile .icon {
    width: 30px;
    height: 30px;
    margin: 0 auto;
    color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .action-tile .icon svg {
    width: 100%;
    height: 100%;
  }

  footer.version {
    text-align: right;
    color: #b6bcc6;
    font-size: 13px;
    margin-top: 20px;
    padding-right: 8px;
  }

  @media (max-width: 900px) {
    nav.links { display: none; }
    .actions-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <div class="topbar"></div>

  <header class="navbar">
    <div class="nav-left">
      <div class="logo">
        <svg width="34" height="28" viewBox="0 0 34 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 15L10 24L18 8" stroke="#2f6ee0" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 15L18 24L33 2" stroke="#2f6ee0" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <nav class="links">
        <a href="#" class="active">Панель</a>
        <a href="#">Запрошення</a>
        <a href="#">Попередні візити</a>
        <a href="#">Типи візитів</a>
        <a href="#">Налаштування</a>
      </nav>
    </div>
    <div class="nav-right">
      <div class="pill">
        <span class="count">7</span>
        <span>запрошень</span>
        <span class="plus-icon">+</span>
      </div>
      <div class="badge-free">Free</div>
      <div class="user-menu">
        <svg class="globe" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="9"/>
          <path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/>
        </svg>
        <span>Anton Novikow</span>
        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </div>
    </div>
  </header>

  <main>
    <h1 class="page-title">Панель</h1>

    <div class="toolbar-card">
      <div class="btn-invite">
        <button class="main">Запросити</button>
        <button class="chev">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="actions-card">
      <div class="actions-grid">

        <div class="action-tile">
          <h3>Запросіть своїх пацієнтів</h3>
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <line x1="19" y1="8" x2="19" y2="14"/>
              <line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
          </div>
        </div>

        <div class="action-tile">
          <h3>Керуйте запрошеннями</h3>
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
              <line x1="14" y1="14" x2="14" y2="21"/>
              <line x1="21" y1="14" x2="21" y2="14.01"/>
              <line x1="17.5" y1="14" x2="17.5" y2="17.5"/>
              <line x1="14" y1="17.5" x2="17.5" y2="17.5"/>
              <line x1="17.5" y1="17.5" x2="21" y2="17.5"/>
              <line x1="21" y1="17.5" x2="21" y2="21"/>
              <line x1="14" y1="21" x2="21" y2="21"/>
            </svg>
          </div>
        </div>

        <div class="action-tile">
          <h3>Перегляньте попередні візити</h3>
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              <line x1="7" y1="9" x2="15" y2="9"/>
              <line x1="7" y1="13" x2="12" y2="13"/>
            </svg>
          </div>
        </div>

        <div class="action-tile">
          <h3>Типи візитів</h3>
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
              <circle cx="12" cy="13" r="2"/>
              <line x1="12" y1="12" x2="12" y2="14"/>
              <line x1="11" y1="13" x2="13" y2="13"/>
            </svg>
          </div>
        </div>

        <div class="action-tile">
          <h3>Змініть налаштування</h3>
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </div>
        </div>

      </div>
    </div>

    <footer class="version">Previsit.ai v1.6.5</footer>
  </main>

</body>
</html>
